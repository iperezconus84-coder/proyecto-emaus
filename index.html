<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proyecto Emaús</title>
  <meta name="theme-color" content="#003366">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Emaus">
  <style>
    :root { --azul: #003366; --amarillo: #FFD700; --blanco: #FFFFFF; --gris: #f4f4f4; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--gris); margin: 0; padding-bottom: 50px; color: #333; }
    header { background: var(--blanco); padding: 15px; text-align: center; border-bottom: 2px solid var(--azul); }
    .logo { max-width: 150px; height: auto; display: block; margin: 0 auto; }
    nav { display: flex; justify-content: center; background: var(--blanco); padding: 10px; border-bottom: 1px solid #ddd; flex-wrap: wrap; }
    nav button, nav a { border: none; background: none; padding: 10px 15px; cursor: pointer; color: var(--azul); font-weight: 600; text-decoration: none; transition: 0.3s; }
    nav button.active { border-bottom: 3px solid var(--amarillo); }
    main { max-width: 650px; margin: 20px auto; background: var(--blanco); padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .lectio-paso { margin-bottom: 20px; border-left: 4px solid var(--amarillo); padding-left: 15px; }
    .paso-titulo { font-weight: bold; color: var(--azul); display: block; margin-bottom: 5px; }
    .btn-mod { display: block; width: 100%; padding: 15px; margin: 8px 0; background: var(--azul); color: white; border: none; border-radius: 8px; text-align: left; cursor: pointer; }
    .btn-cta { background: var(--amarillo); border: none; padding: 15px; font-weight: bold; border-radius: 8px; width: 100%; color: var(--azul); cursor: pointer; margin-top: 15px; }
    .btn-share { background: #f4f4f4; color: var(--azul); border: 1px solid #ddd; margin-top: 10px; }
    .aviso-ritmo { background: #fffdf0; border-left: 4px solid var(--amarillo); padding: 14px 16px; border-radius: 4px; margin: 18px 0; font-size: 0.95em; color: #555; line-height: 1.5; }
    .tarjeta { margin-bottom: 15px; border-left: 4px solid var(--azul); padding: 15px; background: #fafafa; border-radius: 0 8px 8px 0; }
  </style>
</head>
<body>
  <header><img src="logo.jpg" alt="Logo Proyecto Emaus" class="logo"></header>
  <nav id="nav">
    <button onclick="router('home')">Inicio</button>
    <button onclick="router('itinerario')">Itinerario</button>
    <button onclick="router('materiales')">Materiales</button>
    <a href="https://espacioemaus.blogspot.com/" target="_blank">Blog</a>
    <a href="https://whatsapp.com/channel/0029Vb8hGfu2kNFqotfaiD3k" target="_blank">WhatsApp</a>
  </nav>
  <main id="view-port"></main>

  <script>
    const data = [
      {t: "Encuentro", c: "Lc 24, 15", p: {"1. Lectura": "Jesús camina con ellos. ¿Dónde está Él hoy en tu rutina?", "2. Meditación": "¿Qué te impide reconocerlo?", "3. Oración": "Quédate conmigo, Señor.", "4. Contemplación": "Camina hoy 5 min en silencio."}},
      {t: "Escucha", c: "Mc 4, 23", p: {"1. Lectura": "El que tenga oídos, oiga.", "2. Meditación": "¿Qué ruido interno te distrae?", "3. Oración": "Habla, Señor, tu siervo escucha.", "4. Contemplación": "Escucha a alguien sin interrumpir."}},
      {t: "Reconocimiento", c: "Lc 24, 31", p: {"1. Lectura": "Se les abrieron los ojos.", "2. Meditación": "¿Qué bondad has recibido?", "3. Oración": "Gracias, Señor, por tu presencia.", "4. Contemplación": "Agradece un pequeño detalle."}},
      {t: "Oración", c: "Lc 11, 1", p: {"1. Lectura": "Enséñanos a orar.", "2. Meditación": "¿Sientes la oración como carga?", "3. Oración": "Padre, confío en tu amor.", "4. Contemplación": "Reza un Padre Nuestro pausado."}},
      {t: "Comunidad", c: "Hch 2, 42", p: {"1. Lectura": "Perseveraban en la comunión.", "2. Meditación": "¿Quiénes son tus hermanos?", "3. Oración": "Hazme puente de unión.", "4. Contemplación": "Envía un mensaje de aliento."}},
      {t: "Discernimiento", c: "1Jn 4, 1", p: {"1. Lectura": "Poned a prueba los espíritus.", "2. Meditación": "¿Qué te da verdadera paz?", "3. Oración": "Dame luz, Espíritu Santo.", "4. Contemplación": "Elige lo que te hace libre."}},
      {t: "Conversión", c: "Mc 1, 15", p: {"1. Lectura": "Convertíos y creed.", "2. Meditación": "¿Qué actitud necesitas dejar?", "3. Oración": "Crea en mí un corazón nuevo.", "4. Contemplación": "Realiza un acto de servicio oculto."}},
      {t: "Seguimiento", c: "Lc 9, 23", p: {"1. Lectura": "Niéguese a sí mismo.", "2. Meditación": "¿Qué añadido innecesario te pesa?", "3. Oración": "Mi vida es tuya, Señor.", "4. Contemplación": "Renuncia a un capricho hoy."}},
      {t: "Testimonio", c: "Mt 5, 14", p: {"1. Lectura": "Sois luz del mundo.", "2. Meditación": "¿Tu vida ilumina?", "3. Oración": "Que mi vida sea un faro.", "4. Contemplación": "Comparte algo positivo."}},
      {t: "Misión", c: "Mt 28, 19", p: {"1. Lectura": "Id y anunciad.", "2. Meditación": "¿A quién urge esperanza?", "3. Oración": "Envíame, aquí estoy.", "4. Contemplación": "Invita a alguien al proyecto."}}
    ];

    function router(view, i = null) {
      const main = document.getElementById('view-port');
      const buttons = document.querySelectorAll('nav button');
      buttons.forEach(b => b.classList.remove('active'));
      if(view === 'home') buttons[0].classList.add('active');
      else if(view === 'itinerario') buttons[1].classList.add('active');
      else if(view === 'materiales') buttons[2].classList.add('active');

      if (view === 'home') {
        main.innerHTML = "<h2>Proyecto Emaús: Tu camino, tu encuentro.</h2><p><span style='font-size:1.4em; font-weight:bold; color:var(--azul);'>Bienvenido</span> a Emaus. No eres un usuario más, eres un peregrino.</p><div class='aviso-ritmo'>💛 Un consejo: este itinerario no es una carrera. Recórrelo a tu ritmo.</div><button class='btn-cta' onclick='router(\"itinerario\")'>👣 Iniciar mi Itinerario</button>";
      } else if (view === 'itinerario') {
        main.innerHTML = "<h3>Itinerario Orante</h3>" + data.map((m, idx) => `<button class='btn-mod' onclick='router(\"detalle\", ${idx})'>Módulo ${idx+1}: ${m.t}</button>`).join('');
      } else if (view === 'detalle') {
        const m = data[i];
        let html = `<h3>Módulo ${i+1}: ${m.t}</h3><p><strong>Cita:</strong> ${m.c}</p>`;
        for(let p in m.p) html += `<div class='lectio-paso'><span class='paso-titulo'>${p}</span><p>${m.p[p]}</p></div>`;
        html += `<button class='btn-cta' onclick='shareModule("${m.t}")'>📤 Invitar a un amigo</button>`;
        html += `<button class='btn-cta' style='background:#ddd' onclick='router(\"itinerario\")'>⬅ Volver al Itinerario</button>`;
        main.innerHTML = html;
      } else if (view === 'materiales') {
        main.innerHTML = "<h3>Materiales: Devocionario</h3>" + 
        [{s:"🙏 Oración de Emaus", c:"Señor Jesús, que sales a nuestro encuentro..."}, {s:"👣 Oración del Joven Peregrino", c:"Padre, me pongo en camino..."}, {s:"🕊️ Invocación al Espíritu Santo", c:"Ven, Espíritu Santo..."}, {s:"📿 Santo Rosario Juvenil", c:"María, Madre del camino..."}]
        .map(o => `<div class='tarjeta'><span class='paso-titulo'>${o.s}</span><p>${o.c}</p></div>`).join('');
      }
    }

    function shareModule(titulo) {
      if (navigator.share) {
        navigator.share({ title: 'Proyecto Emaus', text: 'Te invito a recorrer este camino conmigo: ' + titulo, url: window.location.href });
      } else { alert("Copia el enlace de tu navegador para invitar a alguien."); }
    }
    
    if ('serviceWorker' in navigator) window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
    router('home');
  </script>
</body>
</html>
