<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proyecto Emaús</title>
  <meta name="theme-color" content="#003366">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Emaus">
  <style>
    :root { --azul: #003366; --amarillo: #FFD700; --blanco: #FFFFFF; --gris: #f4f4f4; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--gris); margin: 0; padding-bottom: 50px; color: #333; }
    header { background: var(--blanco); padding: 15px; text-align: center; border-bottom: 2px solid var(--azul); }
    .logo { max-width: 150px; height: auto; display: block; margin: 0 auto; }
    nav { display: flex; justify-content: center; background: var(--blanco); padding: 10px; border-bottom: 1px solid #ddd; flex-wrap: wrap; }
    nav button, nav a { border: none; background: none; padding: 10px 15px; cursor: pointer; color: var(--azul); font-weight: 600; text-decoration: none; transition: 0.3s; }
    nav button.active { border-bottom: 3px solid var(--amarillo); }
    main { max-width: 650px; margin: 20px auto; background: var(--blanco); padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .lectio-paso { margin-bottom: 20px; border-left: 4px solid var(--amarillo); padding-left: 15px; }
    .paso-titulo { font-weight: bold; color: var(--azul); display: block; margin-bottom: 5px; }
    .btn-mod { display: block; width: 100%; padding: 15px; margin: 8px 0; background: var(--azul); color: white; border: none; border-radius: 8px; text-align: left; cursor: pointer; }
    .btn-cta { background: var(--amarillo); border: none; padding: 15px; font-weight: bold; border-radius: 8px; width: 100%; color: var(--azul); cursor: pointer; margin-top: 15px; }
    .aviso-ritmo { background: #fffdf0; border-left: 4px solid var(--amarillo); padding: 14px 16px; border-radius: 4px; margin: 18px 0; font-size: 0.95em; color: #555; line-height: 1.5; }
    .tarjeta { margin-bottom: 15px; border-left: 4px solid var(--azul); padding: 15px; background: #fafafa; border-radius: 0 8px 8px 0; }
  </style>
</head>
<body>
  <header><img src="logo.jpg" alt="Logo Proyecto Emaus" class="logo"></header>
  <nav id="nav">
    <button onclick="router('home')">Inicio</button>
    <button onclick="router('itinerario')">Itinerario</button>
    <button onclick="router('materiales')">Materiales</button>
    <a href="https://espacioemaus.blogspot.com/" target="_blank">Blog</a>
    <a href="https://whatsapp.com/channel/0029Vb8hGfu2kNFqotfaiD3k" target="_blank">WhatsApp</a>
  </nav>
  <main id="view-port"></main>

  <script>
    const data = [
      {t: "Encuentro", c: "Lc 24, 15", p: {"1. Lectura": "Lee Lc 24, 15 lentamente. Jesús se acerca y camina con ellos sin que lo llamen. Lee la cita una segunda vez y siente ese acercamiento.", "2. Meditación": "Cierra los ojos e imagina que caminas por una calle cotidiana. ¿Qué preocupaciones traes hoy? Imagina a Jesús acercándose y caminando a tu lado en medio de tu rutina.", "3. Oración": "Señor, hoy me presento tal como soy: con mis cansancios y dudas. Ven y camina a mi lado.", "4. Contemplación": "Busca un objeto que represente tu caminar hoy y cuéntale a Jesús qué es lo que más te pesa. Al salir, haz un signo de la cruz breve: Él sale contigo."}},
      {t: "Escucha", c: "Lc 24, 16", p: {"1. Lectura": "Lee Lc 24, 16. 'Sus ojos estaban impedidos de reconocerle'. Lee de nuevo: ¿Cuántas veces está Él ahí y no lo veo?", "2. Meditación": "Observa el ruido de tu mente: pensamientos, miedos, pendientes. Imagina que dejas cada uno de ellos a un lado, como si te quitaras una mochila pesada.", "3. Oración": "Espíritu Santo, limpia mis oídos de todo ruido y prisa. Quiero reconocer tu mirada.", "4. Contemplación": "Dedica 5 min de silencio absoluto. Escribe la palabra que crees que Dios te susurró. Escucha a alguien hoy hasta el final, sin interrumpir."}},
      {t: "Reconocimiento", c: "Lc 24, 31", p: {"1. Lectura": "Lee Lc 24, 31. Repite mentalmente: 'Se les abrieron los ojos'.", "2. Meditación": "Revisa tu día como si fuera una película. Dios no es solo de capilla, está en tu café, en el trabajo, en el cansancio. ¿Dónde lo viste hoy?", "3. Oración": "Señor, mis ojos están velados por mis expectativas. Ábremelos para reconocerte.", "4. Contemplación": "Lista 3 momentos de bondad recibida esta semana. Envía un mensaje de agradecimiento a alguien por algo pequeño."}},
      {t: "Oración", c: "Lc 24, 29", p: {"1. Lectura": "Lee Lc 24, 29. 'Quédate con nosotros'. Repite la frase varias veces dejando que resuene en tu pecho.", "2. Meditación": "Adopta una postura cómoda. Imagina que Jesús te mira con amor, sin juzgarte. Orar no es usar palabras elegantes, es decirle: 'Quédate conmigo, porque te necesito'.", "3. Oración": "Enséñame, Señor, a dejar mis máscaras al entrar en tu presencia.", "4. Contemplación": "Escribe una carta a Dios contando tu miedo más profundo. Reza un Padre Nuestro pausado, deteniéndote en cada palabra."}},
      {t: "Comunidad", c: "Lc 24, 32", p: {"1. Lectura": "Lee Lc 24, 32. '¿No ardía nuestro corazón?'. Imagina el calor de la Palabra compartida.", "2. Meditación": "La fe solitaria se marchita. Dios nos pensó en plural. ¿Quiénes son esos hermanos que hacen arder tu corazón?", "3. Oración": "Señor, gracias por los rostros que pusiste en mi vida. Hazme puente de unidad.", "4. Contemplación": "Identifica a un hermano que necesite calor hoy. Envíale un mensaje de aliento sincero hoy, sin esperar nada a cambio."}},
      {t: "Discernimiento", c: "Lc 24, 27", p: {"1. Lectura": "Lee Lc 24, 27. 'Les explicó lo que se refería a él'. Lee de nuevo y busca la luz.", "2. Meditación": "Discernir no es adivinar, es elegir no entre lo malo y lo bueno, sino entre lo bueno y lo mejor que te da paz.", "3. Oración": "Dame luz, Espíritu Santo, para elegir según tu amor y no según mis caprichos.", "4. Contemplación": "Ante una decisión, pregúntate: '¿Esto construye o divide?'. Quédate con la opción que te hace más libre."}},
      {t: "Conversión", c: "Lc 24, 38", p: {"1. Lectura": "Lee Lc 24, 38. '¿Por qué se inquietan?'. Lee y deja que esa pregunta baje al corazón.", "2. Meditación": "Cargamos culpas que Él ya perdonó. Imagina que sueltas esa piedra que te hace esclavo del pasado.", "3. Oración": "Señor, hoy quiero dejar atrás mis sombras y mi peso muerto por amor a tu luz.", "4. Contemplación": "Pon esa actitud específica en manos de Jesús. Realiza un pequeño acto de servicio oculto hoy, solo para Dios."}},
      {t: "Seguimiento", c: "Lc 24, 33", p: {"1. Lectura": "Lee Lc 24, 33. 'Se pusieron en camino inmediatamente'. Imagina la decisión de sus pasos.", "2. Meditación": "La fe no es un subidón de emociones, es la fidelidad de seguirle incluso cuando no tienes ganas. Mantén el paso.", "3. Oración": "Señor, no quiero ser un seguidor a medias. Quiero caminar tras tus huellas, con o sin ganas.", "4. Contemplación": "Renuncia a un capricho pequeño hoy y entrega ese tiempo a la oración o al servicio."}},
      {t: "Testimonio", c: "Lc 24, 48", p: {"1. Lectura": "Lee Lc 24, 48. 'Ustedes son testigos de esto'. Reflexiona: ¿Qué dice tu vida de Él?", "2. Meditación": "Tu vida es el único Evangelio que mucha gente va a leer. ¿Qué historia están contando tus gestos?", "3. Oración": "Señor, que mi forma de amar sea reflejo real de tu luz.", "4. Contemplación": "Lista 2 talentos tuyos. ¿Cómo los usas para servir hoy? Comparte un gesto positivo en tus redes o en persona."}},
      {t: "Misión", c: "Lc 24, 52", p: {"1. Lectura": "Lee Lc 24, 52. 'Se fueron llenos de alegría'. Imagina esa alegría desbordante.", "2. Meditación": "No eres un discípulo para guardarte el regalo, sino para repartirlo. Tu misión es pequeña, pero necesaria.", "3. Oración": "Envíame, Señor. No soy capaz, pero tú haces todo en mí.", "4. Contemplación": "Elige a alguien que sufre y piensa un gesto concreto para acercarle a Él. Invita formalmente a alguien al Proyecto Emaus."}}
    ];

    const materiales = [
      {s:"🙏 Oración de Emaus", c:"Señor Jesús, que sales a nuestro encuentro en el camino de nuestra vida, camina hoy con nosotros y abre nuestros ojos para reconocerte en el hermano, en la fracción del pan y en la esperanza que nunca muere. Quédate con nosotros, porque atardece. Amén."}, 
      {s:"👣 Oración del Joven Peregrino", c:"Padre, me pongo en camino. Sé que no siempre sé a dónde voy, pero confío en que Tú conoces el final del sendero. Dame valentía para soltar lo que me pesa y libertad para abrazar lo que me hace crecer. Que mis pies sigan tus huellas. Amén."}, 
      {s:"🕊️ Invocación al Espíritu Santo", c:"Ven, Espíritu Santo, llena los corazones de tus fieles y enciende en ellos el fuego de tu amor. Envía, Señor, tu Espíritu y todo será creado, y renovarás la faz de la tierra. Amén."}, 
      {s:"📿 Santo Rosario Juvenil", c:"María, Madre del camino, acompáñanos a orar. Que al contemplar los misterios de la vida de tu Hijo, aprendamos a decir 'fiat' a todo lo que Dios nos pida. Ruega por nosotros, peregrinos de Emaus. Amén."}
    ];

    function router(view, i = null) {
      const main = document.getElementById('view-port');
      const buttons = document.querySelectorAll('nav button');
      buttons.forEach(b => b.classList.remove('active'));
      if(view === 'home') buttons[0].classList.add('active');
      else if(view === 'itinerario') buttons[1].classList.add('active');
      else if(view === 'materiales') buttons[2].classList.add('active');

      if (view === 'home') {
        main.innerHTML = "<h2>Proyecto Emaús: Tu camino, tu encuentro.</h2><p><span style='font-size:1.4em; font-weight:bold; color:var(--azul);'>Bienvenido</span> a Emaus. No eres un usuario más, eres un peregrino. Este camino no se hace solo; se hace en compañía. Aquí no encontrarás teoría, sino un encuentro.</p><div class='aviso-ritmo'>💛 Un consejo antes de empezar: este itinerario no es una carrera. Está pensado para recorrerse a razón de un módulo por semana, dándote tiempo real para leer con calma la Palabra, orar sin apuro y compartir lo que vas viviendo con otras personas. Lo importante no es llegar rápido al final, sino ir formando el hábito de la lectura orante.</div><button class='btn-cta' onclick='router(\"itinerario\")'>👣 Iniciar mi Itinerario</button>";
      } else if (view === 'itinerario') {
        main.innerHTML = "<h3>Itinerario Orante</h3>" + data.map((m, idx) => `<button class='btn-mod' onclick='router(\"detalle\", ${idx})'>Módulo ${idx+1}: ${m.t}</button>`).join('');
      } else if (view === 'detalle') {
        const m = data[i];
        let html = `<h3>Módulo ${i+1}: ${m.t}</h3><p><strong>Cita:</strong> ${m.c}</p>`;
        for(let p in m.p) html += `<div class='lectio-paso'><span class='paso-titulo'>${p}</span><p>${m.p[p]}</p></div>`;
        html += `<button class='btn-cta' onclick='shareModule("${m.t}")'>📤 Invitar a un amigo</button><button class='btn-cta' style='background:#ddd' onclick='router(\"itinerario\")'>⬅ Volver al Itinerario</button>`;
        main.innerHTML = html;
      } else if (view === 'materiales') {
        main.innerHTML = "<h3>Materiales: Devocionario</h3>" + materiales.map(o => `<div class='tarjeta'><span class='paso-titulo'>${o.s}</span><p>${o.c}</p></div>`).join('');
      }
    }

    function shareModule(titulo) {
      if (navigator.share) {
        navigator.share({ title: 'Proyecto Emaus', text: 'Te invito a recorrer este camino conmigo: ' + titulo, url: window.location.href });
      } else { alert("Copia el enlace de tu navegador para invitar a alguien."); }
    }
    
    if ('serviceWorker' in navigator) window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
    router('home');
  </script>
</body>
</html>
