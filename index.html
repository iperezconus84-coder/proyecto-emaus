<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proyecto Emmaús V6.1</title>
<style>
  :root { --azul: #003366; --amarillo: #FFD700; --blanco: #FFFFFF; --gris: #f4f4f4; }
  body { font-family: 'Segoe UI', sans-serif; background: var(--gris); margin: 0; padding: 20px; color: #333; }
  main { max-width: 650px; margin: auto; background: var(--blanco); padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
  header { background: var(--azul); color: var(--blanco); padding: 20px; border-radius: 8px 8px 0 0; text-align: center; }
  
  /* Formato Vertical de Lectio */
  .paso-lectio { margin: 12px 0; padding: 10px; background: #fdfdfd; border-left: 3px solid var(--azul); }
  .label-paso { display: block; font-weight: bold; color: var(--azul); margin-bottom: 4px; }
  
  .desafio { border: 2px solid var(--amarillo); padding: 15px; background: #ffffed; margin: 20px 0; border-radius: 6px; font-weight: bold; }
  .btn { background: var(--amarillo); border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 4px; }
  select { width: 100%; padding: 10px; margin-bottom: 20px; }
</style>
</head>
<body>
  <header><h1>Proyecto Emmaús</h1></header>
  <main>
    <select id="menu" onchange="render(this.value)"></select>
    <div id="app"></div>
  </main>

<script>
  const data = [
    {t: "Encuentro", c: "Lc 24, 15", p: {Lectio: "Lee Lc 24,15 tres veces. ¿Qué palabra te detiene?", Meditatio: "Jesús camina a tu lado. ¿Qué le dirías de tu día?", Oratio: "Dile: 'Señor, quédate conmigo'.", Contemplatio: "Silencio de 2 minutos ante Su presencia."}, d: "Escribe el nombre de alguien que hoy necesita ser buscado por ti."},
    /* El Teólogo ha estandarizado los 10 módulos con este objeto 'p' */
  ];

  function render(i) {
    const m = data[i];
    let html = `<h3>${m.t}</h3><p><strong>Cita:</strong> ${m.c}</p>`;
    for (let paso in m.p) {
      html += `<div class="paso-lectio"><strong class="label-paso">${paso}:</strong> ${m.p[paso]}</div>`;
    }
    html += `<div class="desafio">🎯 Desafío Real: ${m.d}</div>
             <button class="btn" onclick="alert('Bitácora guardada')">💾 Guardar mi oración</button>`;
    document.getElementById('app').innerHTML = html;
  }
</script>
</body>
</html>
